name: Dev Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dev-release:
    name: Dev Release
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore: release') &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore: dev release')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build dev
        run: npm run build:dev

      - name: Read package version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update dev manifest version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('dist-dev/manifest.json', 'utf8'));
          // Keep the -next suffix set by manifest.config.ts
          console.log('Dev manifest version:', manifest.version);
          console.log('Dev plugin id:', manifest.id);
          NODE

      - name: Delete existing next release
        run: gh release delete next --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing next tag
        run: git push origin :refs/tags/next || true

      - name: Create next tag
        run: |
          git tag next
          git push origin next

      - name: Create dev release
        run: |
          gh release create next \
            dist-dev/main.js \
            dist-dev/manifest.json \
            dist-dev/styles.css \
            --title "next" \
            --prerelease \
            --notes "Dev build from main. Version ${{ steps.pkg.outputs.version }}-next."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
